  <text x="290" y="66" text-anchor="middle" font-family="'Reem Kufi',sans-serif" font-weight="700" font-size="40" fill="#f3ecdd">بنود العمران</text>
  <text x="290" y="96" text-anchor="middle" font-family="'Reem Kufi',sans-serif" font-weight="500" font-size="17" fill="#cda767">العقارية</text>
