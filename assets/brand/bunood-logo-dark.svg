<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" role="img" aria-label="بنود العمران العقارية">
  <title>Bunood Al-Omran — horizontal lockup (dark backgrounds)</title>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@500;700&amp;display=swap');</style>
    <linearGradient id="gold2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e3caa0"/><stop offset="1" stop-color="#bf9a59"/></linearGradient>
  </defs>
  <g transform="translate(14,25) scale(0.6667)">
    <rect width="120" height="120" rx="28" fill="#0c3527"/>
    <rect width="120" height="120" rx="28" fill="none" stroke="#bf9a59" stroke-width="2" opacity=".5"/>
    <rect x="60" y="36" width="14" height="60" rx="3.5" fill="url(#gold2)"/>
    <rect x="42" y="50" width="13" height="46" rx="3.2" fill="url(#gold2)" opacity=".92"/>
    <rect x="78" y="58" width="12" height="38" rx="3" fill="url(#gold2)" opacity=".82"/>
    <circle cx="67" cy="28" r="3.6" fill="#e3caa0"/>
    <rect x="36" y="96" width="60" height="5" rx="2.5" fill="#f3ecdd"/>
